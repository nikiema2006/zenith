<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1515"/>
      <stop offset="60%" stop-color="#2A1F1F"/>
      <stop offset="100%" stop-color="#C8102E"/>
    </linearGradient>
    <radialGradient id="spotlight" cx="75%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#C8A03B" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#C8A03B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#spotlight)"/>

  <!-- Catégorie -->
  <text x="80" y="140" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="6" fill="#C8A03B">
    IMPORTATION CHINE → AFRIQUE
  </text>

  <!-- Titre principal -->
  <text x="80" y="260" font-family="Helvetica, Arial, sans-serif" font-size="88" font-weight="900" fill="#FFFFFF">
    China Express
  </text>
  <text x="80" y="350" font-family="Helvetica, Arial, sans-serif" font-size="46" font-weight="700" fill="#C8A03B">
    Catalogue prix d'usine
  </text>

  <!-- Sous-titre -->
  <text x="80" y="430" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.75)">
    De Guanzhou à Ouaga. Livraison garantie.
  </text>

  <!-- Logo rond à droite -->
  <g transform="translate(860, 110)">
    <circle cx="200" cy="200" r="180" fill="rgba(200,160,59,0.10)" stroke="#C8A03B" stroke-width="4"/>
    <text x="400" y="250" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="160" font-weight="900" fill="#C8A03B">Z</text>
  </g>

  <!-- Pied de page -->
  <text x="80" y="595" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.6)">
    zenith6.vercel.app · zenith-global.com · China Express
  </text>
  <text x="1120" y="595" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.45)">
    Burkina Faso
  </text>
</svg>
